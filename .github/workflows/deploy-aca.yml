name: Deploy to Azure Container Apps

# Codifies the manual ACA rebuild+deploy used throughout the QA initiative.
# Vercel ships ONLY the frontend; API routes (src/app/api/**) and engines
# (src/lib/**) live in the ACA image and 404/serve-stale until it is rebuilt.
#
# SETUP REQUIRED before enabling auto-deploy:
#   1. Create an Azure service principal scoped to dataflow-rg and add it as the
#      repo secret AZURE_CREDENTIALS (JSON from `az ad sp create-for-rbac --sdk-auth`).
#   2. (optional) Uncomment the `push:` trigger below so backend changes deploy
#      automatically. Until then this is manual (Actions tab -> Run workflow).
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/app/api/**'
      - 'src/lib/**'
      - 'Dockerfile'
      - 'package.json'
      - 'next.config.js'

concurrency:
  group: deploy-aca
  cancel-in-progress: false

env:
  ACR: dataflowacr
  RG: dataflow-rg
  APP: dataflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Build a uniquely-tagged image. A unique tag + revision suffix is REQUIRED:
      # reusing a tag makes `containerapp update` a no-op (the known deploy trap).
      - name: Build image on ACR
        run: az acr build -r "$ACR" -t "dataflow:${{ github.sha }}" -t dataflow:latest -f Dockerfile .

      - name: Roll the Container App to the new image
        run: |
          az containerapp update -n "$APP" -g "$RG" \
            --image "${ACR}.azurecr.io/dataflow:${{ github.sha }}" \
            --revision-suffix "gh${{ github.run_number }}"

      # Post-deploy smoke: hit the ACA URL DIRECTLY (not via the Vercel rewrite)
      # so a new-route 404 / unhealthy revision fails the deploy immediately.
      - name: Post-deploy smoke
        env:
          DATAFLOW_API_KEY: ${{ secrets.DATAFLOW_API_KEY }}
        run: |
          FQDN=$(az containerapp show -n "$APP" -g "$RG" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Smoke testing https://$FQDN"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://$FQDN/api/auth")
          echo "GET /api/auth -> $code"
          test "$code" = "200"
